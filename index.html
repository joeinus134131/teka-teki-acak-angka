<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teka-Teki Kata</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    /* Cyberpunk (Default) */
    --bg: #050d1a;
    --panel: #0a1628;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --text: #c8e6f5;
    --dim: #4a7a9b;
    --found: #00ff9d;
    --selected: #00d4ff;
    --cell-size: 38px;
  }
  
  [data-theme="matrix"] {
    --bg: #000a00;
    --panel: #001400;
    --border: #004d00;
    --accent: #00ff00;
    --accent2: #33ff33;
    --accent3: #ccffcc;
    --text: #e6ffe6;
    --dim: #009900;
    --found: #33ff33;
    --selected: #00ff00;
  }

  [data-theme="synthwave"] {
    --bg: #0f0518;
    --panel: #1a0b2e;
    --border: #4d1a66;
    --accent: #ff00ff;
    --accent2: #00ffff;
    --accent3: #ffb300;
    --text: #ffe6ff;
    --dim: #b366cc;
    --found: #00ffff;
    --selected: #ff00ff;
  }

  [data-theme="midnight"] {
    --bg: #0b0f19;
    --panel: #111827;
    --border: #374151;
    --accent: #60a5fa;
    --accent2: #facc15;
    --accent3: #f87171;
    --text: #f3f4f6;
    --dim: #9ca3af;
    --found: #facc15;
    --selected: #60a5fa;
  }
  
  [data-theme="crimson"] {
    --bg: #1a0505;
    --panel: #2e0a0a;
    --border: #661a1a;
    --accent: #ff3333;
    --accent2: #ff9933;
    --accent3: #ffff33;
    --text: #ffe6e6;
    --dim: #cc6666;
    --found: #ff9933;
    --selected: #ff3333;
  }
  
  [data-theme="kawaii"] {
    --bg: #fff0f5; /* LavenderBlush */
    --panel: #ffffff;
    --border: #ffb6c1; /* LightPink */
    --accent: #ff69b4; /* HotPink */
    --accent2: #ffb6c1; /* LightPink */
    --accent3: #ffc0cb; /* Pink */
    --text: #5a4b5b; /* dark warm gray */
    --dim: #a084a0;
    --found: #ff69b4;
    --selected: #ff1493; /* DeepPink */
    --is-light: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(0,255,157,0.05) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg) 0%, rgba(0,0,0,0.2) 100%);
    background-attachment: fixed;
  }
  
  /* Animated / Different Backgrounds */
  body[data-bg="grid"] {
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px),
      linear-gradient(180deg, var(--bg) 0%, rgba(0,0,0,0.5) 100%);
    background-size: 40px 40px, 40px 40px, 100% 100%;
    background-attachment: fixed;
  }

  body[data-bg="dots"] {
    background-image: radial-gradient(var(--accent) 1px, transparent 1px);
    background-size: 20px 20px;
    background-color: var(--bg);
    background-position: 0 0;
    background-attachment: fixed;
    animation: slideBg 20s linear infinite;
  }
  
  body[data-bg="waves"] {
    background-color: var(--bg);
    background-image: repeating-radial-gradient(
      circle at 0 0, 
      transparent 0,
      var(--bg) 10px,
      rgba(255,255,255,0.02) 10px,
      rgba(255,255,255,0.02) 20px
    );
    background-attachment: fixed;
  }
  
  body[data-bg="stars"] {
    background-color: var(--bg);
    background-image: 
      radial-gradient(1px 1px at 20px 30px, var(--accent), rgba(0,0,0,0)),
      radial-gradient(1px 1px at 40px 70px, var(--text), rgba(0,0,0,0)),
      radial-gradient(2px 2px at 90px 40px, var(--accent2), rgba(0,0,0,0)),
      radial-gradient(2px 2px at 160px 120px, var(--found), rgba(0,0,0,0));
    background-repeat: repeat;
    background-size: 200px 200px;
    background-attachment: fixed;
    animation: starsBg 40s linear infinite alternate;
  }

  @keyframes slideBg {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }
  
  @keyframes starsBg {
    0% { background-position: 0 0; }
    100% { background-position: 100px 50px; }
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
    width: 100%;
    max-width: 1000px;
  }
  
  /* Additional text styling for kawaii theme headers */
  [data-theme="kawaii"] header h1 {
    text-shadow: 2px 2px 0 #ffe4e1, 4px 4px 0 #ffb6c1;
    color: var(--accent);
    font-family: 'Fredoka One', cursive, sans-serif;
  }
  [data-theme="kawaii"] header h1 span { color: #ff1493; }
  [data-theme="kawaii"] header .tag,
  [data-theme="kawaii"] header .subtitle {
    font-family: sans-serif;
    font-weight: bold;
    color: var(--dim);
  }

  .controls-container {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    gap: 8px;
  }

  .theme-selector, .size-selector, .bg-selector {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    transition: all 0.2s;
  }
  
  .theme-selector:hover, .theme-selector:focus,
  .size-selector:hover, .size-selector:focus,
  .bg-selector:hover, .bg-selector:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 10px rgba(0,255,157,0.2);
  }
  
  .theme-selector option, .size-selector option, .bg-selector option {
    background: var(--bg);
    color: var(--text);
  }

  header .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2);
    margin-bottom: 6px;
  }

  header h1 span { color: var(--accent2); }

  header .subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--dim);
  }

  .main-layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
  }

  .board-container {
    position: relative;
  }

  .board-frame {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    background: var(--panel);
    position: relative;
    box-shadow: 0 0 40px rgba(0,212,255,0.08), inset 0 0 60px rgba(0,0,0,0.3);
  }
  
  [data-theme="kawaii"] .board-frame {
    border: 4px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
  }

  .board-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    border: 1px solid transparent;
    background: linear-gradient(135deg, rgba(0,212,255,0.3), transparent 50%, rgba(0,255,157,0.2)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    pointer-events: none;
  }
  
  [data-theme="kawaii"] .board-frame::before { display: none; }

  .corner { position: absolute; width: 12px; height: 12px; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); }
  .corner::before { width: 100%; height: 2px; top: 0; }
  .corner::after { width: 2px; height: 100%; top: 0; }
  .c-tl { top: -1px; left: -1px; }
  .c-tr { top: -1px; right: -1px; transform: scaleX(-1); }
  .c-bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
  .c-br { bottom: -1px; right: -1px; transform: scale(-1); }
  
  [data-theme="kawaii"] .corner { display: none; }

  #grid {
    display: grid;
    gap: 2px;
    user-select: none;
    cursor: crosshair;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    border: 1px solid rgba(26,58,92,0.4);
    border-radius: 2px;
    transition: all 0.12s ease;
    position: relative;
    background: rgba(10,22,40,0.6);
  }
  
  [data-theme="kawaii"] .cell {
    font-family: 'Nunito', sans-serif;
    border-radius: 10px;
    border: 2px solid transparent;
    background: #ffeeef;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell:hover { border-color: var(--accent); color: #fff; background: rgba(0,212,255,0.06); }
  .cell.selecting { background: rgba(0,212,255,0.18); border-color: var(--selected); color: #fff; box-shadow: inset 0 0 8px rgba(0,212,255,0.3); }
  .cell.found { background: rgba(0,255,157,0.12); border-color: var(--found); color: var(--found); box-shadow: inset 0 0 8px rgba(0,255,157,0.2); }
  .cell.found.selecting { background: rgba(0,255,157,0.2); }
  
  /* Kawaii cell states */
  [data-theme="kawaii"] .cell:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #fff;
    transform: scale(1.15) rotate(3deg);
    z-index: 10;
    box-shadow: 0 4px 10px rgba(255, 105, 180, 0.4);
  }
  [data-theme="kawaii"] .cell.selecting {
    background: var(--accent);
    color: #fff;
    transform: scale(1.1);
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.5);
  }
  [data-theme="kawaii"] .cell.found {
    background: var(--found);
    color: #fff;
    border-color: #fff;
    animation: bouncePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 8px rgba(255, 105, 180, 0.3);
  }
  [data-theme="kawaii"] .cell.found.selecting { background: var(--accent); }
  
  @keyframes bouncePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3) rotate(-5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .sidebar {
    display: flex;
    flex-direction: row;
    gap: 20px;
  }
  
  .word-list-panel, .stats-panel {
    flex: 1;
    min-width: 200px;
  }

  .word-list-panel {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    padding: 16px;
    position: relative;
  }
  
  [data-theme="kawaii"] .word-list-panel, [data-theme="kawaii"] .stats-panel {
    border-radius: 16px;
    border: 3px solid var(--border);
    box-shadow: 0 8px 0 var(--border);
    margin-bottom: 8px; /* Room for shadow */
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  
  [data-theme="kawaii"] .panel-title {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    color: var(--accent);
    font-weight: 900;
    border-bottom: 2px dashed var(--border);
  }

  .word-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 12px;
    letter-spacing: 1.5px;
    color: var(--dim);
    transition: all 0.2s;
    border-bottom: 1px solid rgba(26,58,92,0.3);
  }
  
  [data-theme="kawaii"] .word-item {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border-bottom: none;
    padding: 8px 0;
  }

  .word-item:last-child { border-bottom: none; }
  .word-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  
  [data-theme="kawaii"] .word-item .dot {
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffb6c1"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
    background-size: contain;
    width: 14px;
    height: 14px;
    border-radius: 0;
  }
  
  .word-item.found-word { color: var(--found); }
  .word-item.found-word .dot { background: var(--found); box-shadow: 0 0 6px var(--found); }
  
  [data-theme="kawaii"] .word-item.found-word .dot {
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff69b4"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
    background-size: contain;
    box-shadow: none;
    animation: heartPulse 1s infinite;
  }
  
  @keyframes heartPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .word-item.found-word span { text-decoration: line-through; opacity: 0.6; }
  
  [data-theme="kawaii"] .word-item.found-word span {
    text-decoration: none;
    opacity: 1;
    color: var(--found);
    position: relative;
    display: inline-block;
  }
  [data-theme="kawaii"] .word-item.found-word span::after {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 3px;
    background: var(--found);
    border-radius: 2px;
    animation: strike 0.4s ease-out forwards;
  }
  
  @keyframes strike {
    from { width: 0; }
    to { width: 100%; }
  }

  .stats-panel {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    padding: 16px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 11px;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(26,58,92,0.3);
  }

  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--dim); }
  .stat-value { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent2); font-size: 14px; }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px var(--accent);
    width: 0%;
  }

  .btn-reset {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--dim);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  
  [data-theme="kawaii"] .btn-reset {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    border-radius: 12px;
    border: 3px solid var(--border);
    background: var(--bg);
    color: var(--accent);
    font-weight: 800;
    box-shadow: 0 4px 0 var(--border);
    margin-top: 10px;
  }

  .btn-reset:hover {
    border-color: var(--accent3);
    color: var(--accent3);
    box-shadow: 0 0 12px rgba(255,107,53,0.2);
  }
  
  [data-theme="kawaii"] .btn-reset:hover {
    box-shadow: 0 2px 0 var(--border);
    transform: translateY(2px);
    background: var(--border);
    color: #fff;
  }
  
  [data-theme="kawaii"] #btn-next-step, [data-theme="kawaii"] #btn-prev-step {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 4px 0 var(--accent);
  }
  [data-theme="kawaii"] #btn-next-step:hover, [data-theme="kawaii"] #btn-prev-step:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 0 var(--accent);
  }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,13,26,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  
  [data-theme="kawaii"] .win-overlay {
    background: rgba(255, 240, 245, 0.95);
  }

  .win-overlay.active { display: flex; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%,100% { text-shadow: 0 0 20px var(--accent2); } 50% { text-shadow: 0 0 60px var(--accent2), 0 0 100px var(--accent2); } }

  .win-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--accent2);
    animation: pulse 2s infinite;
    letter-spacing: 4px;
    text-align: center;
  }
  
  [data-theme="kawaii"] .win-title {
    font-family: 'Fredoka One', cursive, sans-serif;
    color: var(--accent);
    text-shadow: 3px 3px 0 #ffe4e1;
    animation: bouncePop 1.5s infinite;
  }

  .win-sub { font-size: 14px; letter-spacing: 2px; color: var(--dim); text-align: center; }

  @media (max-width: 600px) {
    :root { --cell-size: 28px; }
    .cell { font-size: 10px; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
    .word-list-panel, .stats-panel { flex: 1; min-width: 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="tag">// TEKA-TEKI KATA //</div>
  <h1>TEKA-TEKI <span id="step-indicator">STEP 1</span></h1>
  <div class="subtitle">TEMUKAN SEMUA KATA TERSEMBUNYI</div>
  <div class="controls-container">
    <select class="bg-selector" id="bg-select" onchange="changeBackground(this.value)">
      <option value="default">BG NORMAL</option>
      <option value="grid">BG JARING</option>
      <option value="dots">BG TITIK ANIMASI</option>
      <option value="waves">BG GELOMBANG</option>
      <option value="stars">BG BINTANG</option>
    </select>
    <select class="size-selector" id="size-select" onchange="changeGridSize(this.value)">
      <option value="9">9x9</option>
      <option value="10">10x10</option>
      <option value="14" selected>14x14</option>
    </select>
    <select class="theme-selector" id="theme-select" onchange="changeTheme(this.value)">
      <option value="default">CYBERPUNK</option>
      <option value="matrix">THE MATRIX</option>
      <option value="synthwave">SYNTHWAVE</option>
      <option value="midnight">MIDNIGHT</option>
      <option value="crimson">CRIMSON</option>
      <option value="kawaii">KAWAII 🌸</option>
    </select>
  </div>
</header>

<div class="main-layout">
  <div class="board-container">
    <div class="board-frame">
      <div class="corner c-tl"></div>
      <div class="corner c-tr"></div>
      <div class="corner c-bl"></div>
      <div class="corner c-br"></div>
      <div id="grid"></div>
    </div>
  </div>

  <div class="sidebar">
    <div id="word-steps-container" style="display: contents;"></div>
    <div class="stats-panel">
      <div class="panel-title">▸ STATISTIK</div>
      <div class="stat-row">
        <span class="stat-label">DITEMUKAN</span>
        <span class="stat-value" id="stat-found">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">TOTAL KATA</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <button class="btn-reset" onclick="initGame(currentStepIndex)">↺ RESET STEP INI</button>
      <button class="btn-reset" onclick="showHint()" style="border-color: var(--accent2); color: var(--accent2);">💡 MINTA KISI-KISI</button>
      <div style="display: flex; gap: 8px; margin-top: 4px;">
        <button class="btn-reset" id="btn-prev-step" onclick="prevStep()" style="flex: 1; display: none; margin-top: 0; border-color: var(--accent); color: var(--accent);">❮ KEMBALI</button>
        <button class="btn-reset" id="btn-next-step" onclick="nextStep()" style="flex: 1; display: none; margin-top: 0; border-color: var(--accent); color: var(--accent);">LANJUT ❯</button>
      </div>
    </div>
  </div>
</div>

<div class="win-overlay" id="overlay">
  <div class="win-title" id="overlay-title">✓ SELESAI!</div>
  <div class="win-sub" id="overlay-sub">SEMUA KATA BERHASIL DITEMUKAN</div>
  <button class="btn-reset" id="overlay-btn" style="width:200px;margin-top:16px">LANJUT</button>
</div>

<script>
const WORD_STEPS = [
  { name: 'STEP 1', words: ['KPI','MAYORA','INDAH','JAYANTI','DUA','HIJAU'] },
  { name: 'STEP 2', words: ['EFFICIENCY','ENERGY','CONSUMPTION','HEMAT','LISTRIK'] },
  { name: 'STEP 3', words: ['HASIL','AUDIT','ZERO','FINDING','EKSTERNAL','KITA'] }
];
// Hanya arah maju: Kanan [0,1], Bawah [1,0], Diagonal Bawah Kanan [1,1], Diagonal Atas Kanan [-1,1]
const DIRECTIONS = [[0,1],[1,0],[1,1],[-1,1]];
let selectedSize = 14;
let COLS = 14;
let ROWS = 14;

let currentStepIndex = 0;
let activeWords = [];
let grid = [], placed = [], foundWords = new Set();
let selecting = false, startCell = null, currentSelection = [];

function initGame(step = 0) {
  currentStepIndex = step;
  activeWords = WORD_STEPS[currentStepIndex].words;
  
  // Calculate minimum size needed for the longest word in this step
  const maxWordLength = Math.max(...activeWords.map(w => w.length));
  COLS = Math.max(selectedSize, maxWordLength);
  ROWS = Math.max(selectedSize, maxWordLength);

  let allPlaced = false;
  let layoutAttempts = 0;
  
  while (!allPlaced && layoutAttempts < 100) {
    layoutAttempts++;
    grid = Array.from({length: ROWS}, () => Array(COLS).fill(''));
    placed = [];
    allPlaced = true;
    
    const sorted = [...activeWords].sort((a,b) => b.length - a.length);
    for (const word of sorted) {
      if (!placeWord(word)) {
        allPlaced = false;
        break; // Start over if any word fails
      }
    }
  }

  foundWords = new Set();
  currentSelection = [];
  selecting = false;
  
  document.getElementById('step-indicator').textContent = WORD_STEPS[currentStepIndex].name;
  const btnPrev = document.getElementById('btn-prev-step');
  const btnNext = document.getElementById('btn-next-step');
  
  if (currentStepIndex > 0) {
    btnPrev.style.display = 'block';
  } else {
    btnPrev.style.display = 'none';
  }
  
  if (currentStepIndex < WORD_STEPS.length - 1) {
    btnNext.style.display = 'block';
  } else {
    btnNext.style.display = 'none';
  }

  fillRandom();
  renderGrid();
  renderWordList();
  updateStats();
}

function showOverlay(title, sub, btnText, callback) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent = sub;
  const btn = document.getElementById('overlay-btn');
  btn.textContent = btnText;
  btn.onclick = callback;
  document.getElementById('overlay').classList.add('active');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

function nextStep() {
  if (currentStepIndex < WORD_STEPS.length - 1) {
    initGame(currentStepIndex + 1);
  }
}

function prevStep() {
  if (currentStepIndex > 0) {
    initGame(currentStepIndex - 1);
  }
}

function showHint() {
  const missingWords = placed.filter(p => !foundWords.has(p.word));
  if (missingWords.length === 0) return;
  
  // Pick a random missing word
  const target = missingWords[Math.floor(Math.random() * missingWords.length)];
  const firstLetterCell = target.cells[0]; // [r, c]
  
  // Highlight the first letter specifically
  const el = cellEl(firstLetterCell[0], firstLetterCell[1]);
  if (el) {
    // Flash the cell several times
    let count = 0;
    const interval = setInterval(() => {
      if (count % 2 === 0) {
        el.style.background = 'var(--accent2)';
        el.style.color = '#000';
        el.style.transform = 'scale(1.2)';
        el.style.zIndex = '20';
      } else {
        el.style.background = '';
        el.style.color = '';
        el.style.transform = '';
        el.style.zIndex = '';
      }
      count++;
      if (count >= 6) clearInterval(interval);
    }, 250);
  }
}

function placeWord(word) {
  let placed = false;
  let attempts = 0;
  
  while (!placed && attempts < 2000) {
    attempts++;
    const dir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
    const [dr, dc] = dir;
    const maxR = dr === 0 ? ROWS - 1 : dr > 0 ? ROWS - word.length : word.length - 1;
    const maxC = dc === 0 ? COLS - 1 : dc > 0 ? COLS - word.length : word.length - 1;
    const minR = dr < 0 ? word.length - 1 : 0;
    const minC = dc < 0 ? word.length - 1 : 0;
    const r = Math.floor(Math.random() * (maxR - minR + 1)) + minR;
    const c = Math.floor(Math.random() * (maxC - minC + 1)) + minC;
    
    if (canPlace(word, r, c, dr, dc)) {
      doPlace(word, r, c, dr, dc);
      placed = true;
    }
  }

  if (!placed) {
    console.warn(`Gagal menempatkan kata: ${word}`);
    // You could theoretically restart the grid generation here if you wanted
    // to guarantee all words fit, but 2000 attempts is usually sufficient
    // for sparse boards.
  }
  
  return placed;
}

function canPlace(word, r, c, dr, dc) {
  for (let i = 0; i < word.length; i++) {
    const nr = r + dr * i, nc = c + dc * i;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return false;
    if (grid[nr][nc] !== '' && grid[nr][nc] !== word[i]) return false;
  }
  return true;
}

function doPlace(word, r, c, dr, dc) {
  const cells = [];
  for (let i = 0; i < word.length; i++) {
    const nr = r + dr * i, nc = c + dc * i;
    grid[nr][nc] = word[i];
    cells.push([nr, nc]);
  }
  placed.push({ word, cells });
}

function fillRandom() {
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!grid[r][c]) grid[r][c] = alpha[Math.floor(Math.random() * 26)];
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.style.gridTemplateColumns = `repeat(${COLS}, var(--cell-size))`;
  g.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.textContent = grid[r][c];
      el.dataset.r = r; el.dataset.c = c;
      el.addEventListener('mousedown', onDown);
      el.addEventListener('mouseenter', onEnter);
      el.addEventListener('touchstart', onTouchStart, {passive: true});
      el.addEventListener('touchmove', onTouchMove, {passive: true});
      g.appendChild(el);
    }
  }
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
}

function cellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function onDown(e) {
  selecting = true;
  startCell = [+e.target.dataset.r, +e.target.dataset.c];
  currentSelection = [startCell];
  highlightSelection();
}

function onEnter(e) {
  if (!selecting) return;
  const r = +e.target.dataset.r, c = +e.target.dataset.c;
  const sel = getLineCells(startCell, [r, c]);
  currentSelection = sel;
  highlightSelection();
}

function onTouchStart(e) {
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (el && el.classList.contains('cell')) {
    selecting = true;
    startCell = [+el.dataset.r, +el.dataset.c];
    currentSelection = [startCell];
    highlightSelection();
  }
}

function onTouchMove(e) {
  if (!selecting) return;
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (el && el.classList.contains('cell')) {
    const r = +el.dataset.r, c = +el.dataset.c;
    currentSelection = getLineCells(startCell, [r, c]);
    highlightSelection();
  }
}

function onUp() {
  if (!selecting) return;
  selecting = false;
  checkSelection();
  currentSelection = [];
  highlightSelection();
}

function getLineCells([r1, c1], [r2, c2]) {
  const dr = r2 - r1, dc = c2 - c1;
  const len = Math.max(Math.abs(dr), Math.abs(dc));
  if (len === 0) return [[r1,c1]];
  const sr = Math.round(dr / len), sc = Math.round(dc / len);
  if (dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return [[r1,c1]];
  const cells = [];
  for (let i = 0; i <= len; i++) cells.push([r1 + sr*i, c1 + sc*i]);
  return cells;
}

function highlightSelection() {
  document.querySelectorAll('.cell.selecting').forEach(el => el.classList.remove('selecting'));
  for (const [r,c] of currentSelection) {
    const el = cellEl(r, c);
    if (el) el.classList.add('selecting');
  }
}

function checkSelection() {
  const str = currentSelection.map(([r,c]) => grid[r][c]).join('');
  
  for (const p of placed) {
    if (foundWords.has(p.word)) continue;
    // Hanya cek bacaan maju sesuai urutan seleksi
    if (p.word === str) {
      foundWords.add(p.word);
      for (const [r,c] of p.cells) cellEl(r,c)?.classList.add('found');
      updateStats();
      updateWordList();
      if (foundWords.size === activeWords.length) {
        setTimeout(() => {
          if (currentStepIndex < WORD_STEPS.length - 1) {
            showOverlay('✓ STEP SELESAI!', 'LANJUT KE TAHAP BERIKUTNYA', 'LANJUT SETELAHNYA ❯', () => {
              hideOverlay();
              initGame(currentStepIndex + 1);
            });
          } else {
            showOverlay('🌟 TUNTAS 🌟', 'SEMUA TAHAP BERHASIL DISELESAIKAN', '↺ MAIN LAGI', () => {
              hideOverlay();
              initGame(0);
            });
          }
        }, 400);
      }
      return;
    }
  }
}

function renderWordList() {
  const container = document.getElementById('word-steps-container');
  const step = WORD_STEPS[currentStepIndex];
  container.innerHTML = `
    <div class="word-list-panel">
      <div class="panel-title">▸ ${step.name}</div>
      <div class="word-list">
        ${step.words.map(w => `
          <div class="word-item ${foundWords.has(w) ? 'found-word' : ''}" id="wi-${w}">
            <div class="dot"></div><span>${w}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function updateWordList() {
  for (const w of activeWords) {
    const el = document.getElementById('wi-'+w);
    if (el) el.className = `word-item ${foundWords.has(w) ? 'found-word' : ''}`;
  }
}

function updateStats() {
  document.getElementById('stat-found').textContent = foundWords.size;
  document.getElementById('stat-total').textContent = activeWords.length;
  document.getElementById('progress-fill').style.width = (foundWords.size / activeWords.length * 100) + '%';
}

function changeTheme(themeName) {
  if (themeName === 'default') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', themeName);
  }
}

function changeBackground(bgName) {
  if (bgName === 'default') {
    document.body.removeAttribute('data-bg');
  } else {
    document.body.setAttribute('data-bg', bgName);
  }
}

function changeGridSize(sizeStr) {
  selectedSize = parseInt(sizeStr);
  initGame(currentStepIndex); // Restart current step with new size
}

// Check saved background
const savedBg = localStorage.getItem('acak-kata-bg');
if (savedBg) {
  document.getElementById('bg-select').value = savedBg;
  changeBackground(savedBg);
}

// Check saved theme
const savedTheme = localStorage.getItem('acak-kata-theme');
if (savedTheme) {
  document.getElementById('theme-select').value = savedTheme;
  changeTheme(savedTheme);
}

// Check saved size
const savedSize = localStorage.getItem('acak-kata-size');
if (savedSize) {
  document.getElementById('size-select').value = savedSize;
  changeGridSize(savedSize);
}

document.getElementById('bg-select').addEventListener('change', function(e) {
  localStorage.setItem('acak-kata-bg', e.target.value);
});

document.getElementById('theme-select').addEventListener('change', function(e) {
  localStorage.setItem('acak-kata-theme', e.target.value);
});

document.getElementById('size-select').addEventListener('change', function(e) {
  localStorage.setItem('acak-kata-size', e.target.value);
});

initGame();
</script>
</body>
</html>
